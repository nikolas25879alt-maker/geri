<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    .container {
        text-align: center;
    }

    h1 {
        font-size: 120px;
        margin: 0;
        letter-spacing: 5px;
    }

    p {
        font-size: 20px;
        color: #bbb;
        margin-top: 10px;
    }

    a {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 28px;
        border: 2px solid #fff;
        color: #fff;
        text-decoration: none;
        transition: 0.3s;
    }

    a:hover {
        background: #fff;
        color: #000;
    }
</style>
</head>

<body>

<div class="container">
    <h1>404</h1>
    <p>Page not found</p>
    <a href="/">Go Home</a>
</div>

</body>
</html>
